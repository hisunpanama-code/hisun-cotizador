<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Cotizaciones HISUN</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    .header {
      background: white;
      padding: 30px;
      border-radius: 10px;
      margin-bottom: 30px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    .header h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 2em;
    }

    .header p {
      color: #666;
      font-size: 1.05em;
    }

    /* Tarjetas de resumen */
    .summary {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .summary-card {
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      border-left: 5px solid #667eea;
    }

    .summary-card.pendientes {
      border-left-color: #ff9800;
    }

    .summary-card.aceptadas {
      border-left-color: #4caf50;
    }

    .summary-card.rechazadas {
      border-left-color: #f44336;
    }

    .summary-card h3 {
      color: #666;
      font-size: 0.9em;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }

    .summary-card .number {
      font-size: 2.5em;
      font-weight: 700;
      color: #333;
    }

    .summary-card .subtitle {
      color: #999;
      font-size: 0.85em;
      margin-top: 10px;
    }

    /* Tabla */
    .section {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      margin-bottom: 30px;
    }

    .section h2 {
      color: #333;
      margin-bottom: 20px;
      font-size: 1.5em;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    thead {
      background: #f5f5f5;
      border-bottom: 2px solid #ddd;
    }

    th {
      padding: 15px;
      text-align: left;
      color: #333;
      font-weight: 600;
      font-size: 0.95em;
    }

    td {
      padding: 15px;
      border-bottom: 1px solid #eee;
      color: #666;
    }

    tr:hover {
      background: #f9f9f9;
    }

    /* Estados */
    .badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.85em;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge.prospecting {
      background: #fff3cd;
      color: #856404;
    }

    .badge.negotiation {
      background: #cfe2ff;
      color: #084298;
    }

    .badge.closedwon {
      background: #d1e7dd;
      color: #0f5132;
    }

    .badge.closedlost {
      background: #f8d7da;
      color: #842029;
    }

    /* Filtros */
    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .filter-btn {
      padding: 8px 16px;
      border: 2px solid #ddd;
      background: white;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9em;
      transition: all 0.3s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: #667eea;
      background: #667eea;
      color: white;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state svg {
      width: 80px;
      height: 80px;
      margin-bottom: 20px;
      opacity: 0.5;
    }

    /* Input */
    .search-box {
      width: 100%;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 0.95em;
      margin-bottom: 20px;
    }

    /* Responsivo */
    @media (max-width: 768px) {
      .header h1 {
        font-size: 1.5em;
      }

      .summary {
        grid-template-columns: 1fr;
      }

      table {
        font-size: 0.9em;
      }

      th, td {
        padding: 10px;
      }
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚙 Dashboard de Cotizaciones HISUN</h1>
    <p>Seguimiento de propuestas de venta - Preventa 2026</p>
  </div>

  <!-- RESUMEN -->
  <div class="summary" id="summary">
    <div class="summary-card">
      <h3>Total de Cotizaciones</h3>
      <div class="number" id="total-cotizaciones">0</div>
      <div class="subtitle">Este mes</div>
    </div>

    <div class="summary-card pendientes">
      <h3>Pendientes</h3>
      <div class="number" id="pendientes-count">0</div>
      <div class="subtitle">Esperando respuesta</div>
    </div>

    <div class="summary-card aceptadas">
      <h3>Aceptadas</h3>
      <div class="number" id="aceptadas-count">0</div>
      <div class="subtitle">Próximas ventas</div>
    </div>

    <div class="summary-card rechazadas">
      <h3>Rechazadas</h3>
      <div class="number" id="rechazadas-count">0</div>
      <div class="subtitle">No interesados</div>
    </div>
  </div>

  <!-- TABLA DE COTIZACIONES -->
  <div class="section">
    <h2>📋 Cotizaciones Recientes</h2>

    <input 
      type="text" 
      id="search" 
      class="search-box" 
      placeholder="Buscar por nombre, email o modelo..."
    >

    <div class="filters">
      <button class="filter-btn active" onclick="filterByStage('all')">Todos</button>
      <button class="filter-btn" onclick="filterByStage('prospecting')">Pendientes</button>
      <button class="filter-btn" onclick="filterByStage('closedwon')">Aceptadas</button>
      <button class="filter-btn" onclick="filterByStage('closedlost')">Rechazadas</button>
    </div>

    <div id="table-container">
      <div class="loading">
        <div class="spinner"></div>
        <p>Cargando cotizaciones...</p>
      </div>
    </div>
  </div>
</div>

<script>
// Configuración
const HUBSPOT_API_KEY = localStorage.getItem('hubspot_api_key') || 'AQUI_VA_TU_API_KEY';
const HUBSPOT_API = 'https://api.hubapi.com';

let allDeals = [];
let currentFilter = 'all';

// Cargar datos
async function loadDeals() {
  try {
    const response = await fetch(`${HUBSPOT_API}/crm/v3/objects/deals?limit=100&properties=dealname,dealstage,amount,closedate,modelo,color,cotizacion_id`, {
      headers: {
        'Authorization': `Bearer ${HUBSPOT_API_KEY}`,
        'Content-Type': 'application/json'
      }
    });

    if (!response.ok) {
      throw new Error('Error al cargar deals. Verifica tu API Key.');
    }

    const data = await response.json();
    allDeals = data.results || [];

    // Cargar info de contactos asociados
    for (let deal of allDeals) {
      const contactResponse = await fetch(
        `${HUBSPOT_API}/crm/v3/objects/deals/${deal.id}/associations/contacts`,
        {
          headers: {
            'Authorization': `Bearer ${HUBSPOT_API_KEY}`,
            'Content-Type': 'application/json'
          }
        }
      );

      if (contactResponse.ok) {
        const contactData = await contactResponse.json();
        if (contactData.results && contactData.results.length > 0) {
          const contactId = contactData.results[0].id;
          
          // Obtener detalles del contacto
          const detailResponse = await fetch(
            `${HUBSPOT_API}/crm/v3/objects/contacts/${contactId}?properties=firstname,lastname,email,phone`,
            {
              headers: {
                'Authorization': `Bearer ${HUBSPOT_API_KEY}`,
                'Content-Type': 'application/json'
              }
            }
          );

          if (detailResponse.ok) {
            const contactDetail = await detailResponse.json();
            deal.contact = contactDetail.properties;
          }
        }
      }
    }

    updateUI();
  } catch (error) {
    console.error('Error:', error);
    document.getElementById('table-container').innerHTML = `
      <div class="empty-state">
        <h3>Error al cargar datos</h3>
        <p>${error.message}</p>
        <p style="margin-top: 20px; font-size: 0.9em;">
          Para que funcione el dashboard, debes:<br>
          1. Tener un API Key de HubSpot válido<br>
          2. Haber creado deals con la estructura correcta
        </p>
      </div>
    `;
  }
}

function updateUI() {
  updateSummary();
  renderTable();
}

function updateSummary() {
  const total = allDeals.length;
  const pendientes = allDeals.filter(d => d.properties.dealstage === 'prospecting').length;
  const aceptadas = allDeals.filter(d => d.properties.dealstage === 'closedwon').length;
  const rechazadas = allDeals.filter(d => d.properties.dealstage === 'closedlost').length;

  document.getElementById('total-cotizaciones').textContent = total;
  document.getElementById('pendientes-count').textContent = pendientes;
  document.getElementById('aceptadas-count').textContent = aceptadas;
  document.getElementById('rechazadas-count').textContent = rechazadas;
}

function renderTable() {
  let filtered = allDeals;

  if (currentFilter !== 'all') {
    filtered = filtered.filter(d => d.properties.dealstage === currentFilter);
  }

  const searchTerm = document.getElementById('search').value.toLowerCase();
  if (searchTerm) {
    filtered = filtered.filter(d => {
      const name = `${d.contact?.firstname || ''} ${d.contact?.lastname || ''}`.toLowerCase();
      const email = (d.contact?.email || '').toLowerCase();
      const modelo = (d.properties.modelo || '').toLowerCase();
      return name.includes(searchTerm) || email.includes(searchTerm) || modelo.includes(searchTerm);
    });
  }

  if (filtered.length === 0) {
    document.getElementById('table-container').innerHTML = `
      <div class="empty-state">
        <p>No hay cotizaciones que coincidan con tu búsqueda.</p>
      </div>
    `;
    return;
  }

  const tableHTML = `
    <table>
      <thead>
        <tr>
          <th>Cliente</th>
          <th>Email</th>
          <th>Modelo</th>
          <th>Color</th>
          <th>Precio</th>
          <th>Estado</th>
          <th>Vigencia</th>
        </tr>
      </thead>
      <tbody>
        ${filtered.map(deal => {
          const contact = deal.contact || {};
          const nombre = `${contact.firstname || ''} ${contact.lastname || ''}`.trim();
          const email = contact.email || '-';
          const modelo = deal.properties.modelo || '-';
          const color = deal.properties.color || '-';
          const precio = deal.properties.amount ? `$${parseInt(deal.properties.amount).toLocaleString()}` : '-';
          const stage = deal.properties.dealstage;
          const closedate = deal.properties.closedate ? new Date(deal.properties.closedate).toLocaleDateString('es-PA') : '-';

          let stageLabel = 'Pendiente';
          let stageBadge = 'prospecting';
          if (stage === 'closedwon') {
            stageLabel = 'Aceptada';
            stageBadge = 'closedwon';
          } else if (stage === 'closedlost') {
            stageLabel = 'Rechazada';
            stageBadge = 'closedlost';
          }

          return `
            <tr>
              <td><strong>${nombre || '-'}</strong></td>
              <td>${email}</td>
              <td>${modelo}</td>
              <td>${color}</td>
              <td>${precio}</td>
              <td><span class="badge ${stageBadge}">${stageLabel}</span></td>
              <td>${closedate}</td>
            </tr>
          `;
        }).join('')}
      </tbody>
    </table>
  `;

  document.getElementById('table-container').innerHTML = tableHTML;
}

function filterByStage(stage) {
  currentFilter = stage;
  
  // Actualizar botones
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.classList.remove('active');
  });
  event.target.classList.add('active');

  renderTable();
}

// Búsqueda en tiempo real
document.getElementById('search').addEventListener('input', renderTable);

// Cargar datos al iniciar
loadDeals();

// Recargar cada 30 segundos
setInterval(loadDeals, 30000);
</script>

</body>
</html>
